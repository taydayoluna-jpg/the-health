<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hearth · Reset password</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="flame">🔥</div>
      <h1>The Hearth</h1>
      <p>set a new password</p>
    </div>

    <div class="auth-msg" id="resetMsg"></div>

    <div id="resetFormView">
      <div class="field">
        <label>New password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters">
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" id="confirmPassword" placeholder="Type it again">
      </div>
      <button class="auth-submit" onclick="handleResetPassword()">Set new password</button>
    </div>

    <div id="resetInvalidView" style="display:none">
      <div class="reset-note">This reset link is invalid or has expired. Request a new one from the sign-in page.</div>
      <div class="auth-links">
        <a href="auth.html">Back to log in</a>
        <span></span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="reset-password.js"></script>
</body>
</html>
